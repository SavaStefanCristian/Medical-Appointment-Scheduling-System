name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  backend-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Medical-Appointment-Scheduling-System-App
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' 

      - name: Verify code formatting
        run: dotnet format --verify-no-changes
        
      - name: Build Solution
        run: dotnet build --configuration Release

      - name: Run Unit Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

  frontend-build-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Medical-Appointment-Scheduling-System-App/frontend
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./Medical-Appointment-Scheduling-System-App/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint Angular Project
        run: npm run lint 

      - name: Build Angular Project
        run: npm run build

  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-lint] 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update API URL for E2E Tests
        run: |
          sed -i "s|apiUrl:.*|apiUrl: 'http://localhost:8080/api',|g" ./Medical-Appointment-Scheduling-System-App/frontend/src/environments/environment.ts

      - name: Start Docker Compose Services
        working-directory: ./Medical-Appointment-Scheduling-System-App
        run: docker compose --env-file .env.test up -d

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API to start..."
          MAX_RETRIES=30
          COUNT=0
          while ! curl -s -f http://localhost:8080/health > /dev/null; do
            COUNT=$((COUNT+1))
            if [ $COUNT -ge $MAX_RETRIES ]; then
              echo "Timeout reached! API failed to start."
              exit 1
            fi
            echo "API not ready yet ($COUNT/$MAX_RETRIES), waiting 2 seconds..."
            sleep 2
          done
          echo "API and Database are up and running!"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ./Medical-Appointment-Scheduling-System-App/e2e-tests/requirements.txt

      - name: Install Python dependencies
        working-directory: ./Medical-Appointment-Scheduling-System-App/e2e-tests
        run: pip install -r requirements.txt

      - name: Run E2E Tests
        working-directory: ./Medical-Appointment-Scheduling-System-App/e2e-tests
        run: pytest
        
      - name: Dump docker logs on failure
        if: failure()
        run: docker compose logs