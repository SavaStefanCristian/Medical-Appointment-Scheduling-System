version: "3.8"

services:
  db:
    image: postgres:latest
    container_name: medical-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1q2w3e
      POSTGRES_DB: MedicalAppDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Medical-Appointment-Scheduling-System-App
      dockerfile: Dockerfile
    container_name: medical-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=MedicalAppDb;Username=postgres;Password=1q2w3e
    depends_on:
      - db

volumes:
  postgres_data:
